<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock - Paper - Scissors</title>
</head>
<body>
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>
    <div id="result"></div>
    <div id="score"></div>
</body>
<script>
 let humanScore = { value: 0 };
    let computerScore = { value: 0 };

function getComputerChoice() {
    const num = Math.random();
    if (num < 0.33) {
        return "rock";
    } else if (num < 0.66) {
        return "paper";
    } else {
        return "scissors";
    }
}

function getHumanChoice(roundNumber) {
    let choice;
    do {
        choice = prompt(`Round ${roundNumber}: Type rock, paper, or scissors`).toLowerCase();
    } while (!["rock","paper","scissors"].includes(choice));
    return choice;
}

function playRound(humanChoice, computerChoice, humanScore, computerScore) {
    const resultDiv = document.getElementById("result");
    const scoreDiv = document.getElementById("score");
    if (humanChoice === computerChoice) {
        resultDiv.textContent = `You clowns made the same choice! You both chose ${humanChoice}`;
    } else if (
        (humanChoice === "rock" && computerChoice === "scissors") ||
        (humanChoice === "paper" && computerChoice === "rock") ||
        (humanChoice === "scissors" && computerChoice === "paper")
    ) {
        resultDiv.textContent = `You did it big dog! ${humanChoice} beats ${computerChoice}`;
        humanScore.value++; 
    } else {
        resultDiv.textContent = `You fool! You lost! ${computerChoice} beats ${humanChoice}`;
        computerScore.value++;
    }
   scoreDiv.textContent = `Score: You: ${humanScore.value} | Computer: ${computerScore.value}`;
    if (humanScore.value === 5 || computerScore.value === 5) {

    resultDiv.textContent = humanScore.value === 5 
        ? "🎉 HELL YEAH! you won the game big dog!" 
        : "💀 You are a LOSER! You lost the game!";

    rockBtn.disabled = true;
    paperBtn.disabled = true;
    scissorsBtn.disabled = true;
    }
}


function playGame() {
    console.log("Game started");

    for (let i = 0; i < 5; i++) {
        const humanChoice = getHumanChoice(i + 1);
        const computerChoice = getComputerChoice();
        playRound(humanChoice, computerChoice, humanScore, computerScore);
        console.log(`Scores => Human: ${humanScore.value}, Computer: ${computerScore.value}`);
        console.log('-------------------------');
    }

    // Final winner
    scoreDiv.textContent = `Score: You: ${humanScore.value} | Computer: ${computerScore.value}`;
    if (humanScore.value > computerScore.value) {
        console.log(`🎉 You won brotha!!!! ${humanScore.value} beats ${computerScore.value}`);
    } else if (humanScore.value === computerScore.value) {
        console.log(`😅 It's a tie! ${humanScore.value} - ${computerScore.value}`);
    } else {
        console.log(`💀 You lost! ${computerScore.value} beats ${humanScore.value}`);
    }
}

const rockBtn = document.getElementById("rock");
rockBtn.addEventListener("click", function() {
    const computerChoice = getComputerChoice();
    playRound("rock", computerChoice, humanScore, computerScore);
});

const paperBtn = document.getElementById("paper");
paperBtn.addEventListener("click", function() {
    const computerChoice = getComputerChoice();
    playRound("paper", computerChoice, humanScore, computerScore);
});

const scissorsBtn = document.getElementById("scissors");
scissorsBtn.addEventListener("click", function() {
    const computerChoice = getComputerChoice();
    playRound("scissors", computerChoice, humanScore, computerScore);
});

// Start the game
// playGame();
</script>
</html>
